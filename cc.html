<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CC Sessions</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
  --border: #30363d; --border2: #21262d;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --accent: #58a6ff; --accent2: #388bfd; --accent-bg: rgba(56,139,253,.1);
  --green: #3fb950; --green-bg: rgba(63,185,80,.08);
  --red: #f85149; --red-bg: rgba(248,81,73,.1);
  --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font: 14px/1.6 -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar { width: 360px; min-width: 360px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; background: var(--surface); }
.sidebar-header { padding: 16px 18px; border-bottom: 1px solid var(--border); }
.logo { font-size: 15px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px; letter-spacing: -.3px; }
.logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), #a371f7);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff; }
.badge { background: var(--accent-bg); color: var(--accent); font-size: 11px;
  padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-left: auto; }
.sort-btn { background: none; border: 1px solid var(--border2); cursor: pointer;
  color: var(--text3); font-size: 11px; padding: 2px 10px; border-radius: 4px;
  transition: all .15s; margin-left: 6px; white-space: nowrap; }
.sort-btn:hover { background: var(--bg); color: var(--text2); border-color: var(--border); }
.sort-bar { display: flex; justify-content: space-between; align-items: center;
  padding: 6px 18px; border-bottom: 1px solid var(--border2); font-size: 11px; color: var(--text3); }
.search-box { position: relative; }
.search { width: 100%; padding: 8px 12px 8px 34px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px; outline: none; transition: border-color .2s; }
.search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 14px; pointer-events: none; }
.session-list { flex: 1; overflow-y: auto; }
.session-item { padding: 12px 18px; border-bottom: 1px solid var(--border2);
  cursor: pointer; transition: all .15s; position: relative; }
.session-item:hover { background: var(--surface2); }
.session-item.active { background: var(--accent-bg); }
.session-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
.session-title { font-weight: 500; font-size: 13px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; padding-right: 24px; }
.session-item.active .session-title { color: var(--accent); }
.pin-btn { position: absolute; right: 14px; top: 12px; background: none; border: none;
  cursor: pointer; font-size: 14px; padding: 2px 4px; opacity: .3; transition: opacity .15s; line-height: 1; }
.pin-btn:hover { opacity: .7; }
.pin-btn.pinned { opacity: 1; }
.session-meta { display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--text3); }
.session-project { background: var(--bg); padding: 2px 7px; border-radius: 4px;
  font-size: 10px; color: var(--text2); border: 1px solid var(--border2); max-width: 160px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-footer { padding: 10px 18px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3); text-align: center; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-empty { flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; color: var(--text3); gap: 12px; }
.main-empty-icon { font-size: 48px; opacity: .3; }
.main-empty-text { font-size: 14px; }

.detail-header { padding: 20px 28px; border-bottom: 1px solid var(--border);
  background: var(--surface); }
.detail-title { font-size: 18px; font-weight: 600; margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px; letter-spacing: -.2px; }
.rename-btn { background: none; border: 1px solid transparent; cursor: pointer; font-size: 13px;
  color: var(--text3); padding: 3px 8px; border-radius: 5px; transition: all .15s; }
.rename-btn:hover { background: var(--bg); border-color: var(--border); color: var(--text); }
.rename-input { background: var(--bg); border: 1px solid var(--accent); border-radius: 5px;
  color: var(--text); font-size: 18px; font-weight: 600; padding: 3px 10px; width: 100%;
  max-width: 500px; outline: none; box-shadow: 0 0 0 3px var(--accent-bg); }
.detail-info { display: flex; gap: 14px; font-size: 12px; color: var(--text2); flex-wrap: wrap;
  margin-bottom: 14px; }
.detail-info span { display: flex; align-items: center; gap: 5px;
  background: var(--bg); padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border2); }
.detail-actions { display: flex; gap: 8px; }
.resume-btn { padding: 7px 16px; background: var(--accent2); color: #fff;
  border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  transition: all .15s; box-shadow: var(--shadow); }
.resume-btn:hover { background: var(--accent); transform: translateY(-1px); }
.resume-btn.copied { background: var(--green); }
.delete-btn { padding: 7px 16px; background: transparent;
  color: var(--text3); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all .15s; }
.delete-btn:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.compress-btn { padding: 7px 16px; background: transparent;
  color: var(--text3); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all .15s; }
.compress-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
.compress-btn:disabled { opacity: .5; cursor: not-allowed; }
.restore-btn { padding: 7px 16px; background: transparent;
  color: var(--green); border: 1px solid var(--green); border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all .15s; }
.restore-btn:hover { background: var(--green-bg); }
.restore-btn:disabled { opacity: .5; cursor: not-allowed; }
.delete-btn.confirm { background: var(--red); color: #fff; border-color: var(--red); font-weight: 600; }

.messages { flex: 1; overflow-y: auto; padding: 24px 28px; }
.msg { margin-bottom: 14px; padding: 14px 18px; border-radius: var(--radius);
  border: 1px solid var(--border2); transition: border-color .15s; }
.msg:hover { border-color: var(--border); }
.msg-user { background: var(--accent-bg); border-color: rgba(56,139,253,.15); }
.msg-assistant { background: var(--green-bg); border-color: rgba(63,185,80,.12); }
.msg-tool { background: var(--surface); padding: 10px 18px; }
.msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.msg-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px;
  padding: 1px 7px; border-radius: 4px; }
.msg-user .msg-label { color: var(--accent); background: rgba(56,139,253,.12); }
.msg-assistant .msg-label { color: var(--green); background: rgba(63,185,80,.1); }
.msg-tool .msg-label { color: var(--text3); background: var(--bg); }
.msg-time { font-size: 10px; color: var(--text3); font-family: 'SF Mono', 'Cascadia Code', monospace;
  margin-left: auto; }
.msg-content { font-size: 13px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
.msg-tool .msg-content { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  font-size: 12px; color: var(--text2); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  width: 720px; max-width: 90vw; max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,.5); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text3);
  font-size: 18px; padding: 2px 6px; border-radius: 4px; transition: all .15s; }
.modal-close:hover { background: var(--bg); color: var(--text); }
.modal-body { padding: 20px; overflow-y: auto; font-size: 13px; line-height: 1.8; color: var(--text2); }
.modal-body.md h1 { font-size: 16px; color: var(--text); margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.modal-body.md h2 { font-size: 14px; color: var(--text); margin: 20px 0 8px; }
.modal-body.md p { margin: 6px 0; }
.modal-body.md ul, .modal-body.md ol { padding-left: 20px; margin: 6px 0; }
.modal-body.md blockquote { border-left: 3px solid var(--accent); padding: 6px 12px; margin: 8px 0;
  background: var(--accent-bg); border-radius: 0 4px 4px 0; color: var(--text); }
.modal-body.md strong { color: var(--text); }
.modal-body.md code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 12px;
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }
.modal-body.md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.modal-body.md table { border-collapse: collapse; margin: 8px 0; font-size: 12px; }
.modal-body.md th, .modal-body.md td { border: 1px solid var(--border); padding: 5px 10px; }
.modal-body.md th { background: var(--bg); color: var(--text); }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.msg { animation: fadeIn .2s ease; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">CC</div>
        Sessions
        <span class="badge" id="count">0</span>
      </div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input class="search" id="search" placeholder="搜索标题、内容、项目...">
      </div>
    </div>
    <div class="sort-bar">
      <span id="sort-label">按活跃度排序</span>
      <button class="sort-btn" onclick="toggleSort()" id="sort-btn" title="切换排序方式">切换排序</button>
    </div>
    <div class="session-list" id="list"></div>
    <div class="sidebar-footer" id="footer">Claude Code Session Manager</div>
  </div>
  <div class="main" id="main">
    <div class="main-empty">
      <div class="main-empty-icon">💬</div>
      <div class="main-empty-text">选择一个会话查看详情</div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let sessions = [], activeId = null, debounce = null, currentCmd = '';
let sortMode = localStorage.getItem('cc-sort') || 'smart';

function sortSessions(list) {
  const sorted = [...list];
  // Pinned always first
  const pinned = sorted.filter(s => s.pinned);
  const rest = sorted.filter(s => !s.pinned);
  if (sortMode === 'freq') {
    pinned.sort((a, b) => b.msg_count - a.msg_count || b.timestamp.localeCompare(a.timestamp));
    rest.sort((a, b) => b.msg_count - a.msg_count || b.timestamp.localeCompare(a.timestamp));
  } else if (sortMode === 'smart') {
    const now = Date.now();
    const month = 30 * 24 * 3600 * 1000;
    const score = s => {
      const age = Math.max(0, now - new Date(s.timestamp || 0).getTime());
      return s.msg_count + Math.max(0, 1 - age / month) * 20;
    };
    pinned.sort((a, b) => score(b) - score(a));
    rest.sort((a, b) => score(b) - score(a));
  } else {
    pinned.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
    rest.sort((a, b) => b.timestamp.localeCompare(a.timestamp));
  }
  return [...pinned, ...rest];
}

function toggleSort() {
  const modes = ['smart', 'freq', 'time'];
  sortMode = modes[(modes.indexOf(sortMode) + 1) % modes.length];
  localStorage.setItem('cc-sort', sortMode);
  render();
}

async function loadSessions(q = '') {
  const url = q ? `/api/search?q=${encodeURIComponent(q)}` : '/api/sessions';
  sessions = await (await fetch(url)).json();
  render();
}

function render() {
  const labels = {smart: '按活跃度排序', freq: '按消息数排序', time: '按时间排序'};
  document.getElementById('sort-label').textContent = labels[sortMode];
  document.getElementById('count').textContent = sessions.length;
  document.getElementById('list').innerHTML = sortSessions(sessions).map(s => `
    <div class="session-item${s.id === activeId ? ' active' : ''}" onclick="select('${s.id}')">
      <button class="pin-btn${s.pinned ? ' pinned' : ''}" onclick="event.stopPropagation();togglePinById('${s.id}')" title="${s.pinned ? '取消置顶' : '置顶'}">${s.pinned ? '📌' : '📍'}</button>
      <div class="session-title">${esc(s.title)}</div>
      <div class="session-meta">
        <span class="session-project">${esc(s.project)}</span>
        <span>${s.time} · ${s.msg_count} 条</span>
      </div>
    </div>
  `).join('');
}

async function select(id) {
  activeId = id;
  render();
  const data = await (await fetch(`/api/session/${id}`)).json();
  const cwd = data.cwd || '';
  currentCmd = cwd ? `cd "${cwd}"; cl -r ${data.id}` : `cl -r ${data.id}`;
  document.getElementById('main').innerHTML = `
    <div class="detail-header">
      <div class="detail-title">
        <span id="title-text">${esc(data.title)}</span>
        <button class="rename-btn" onclick="togglePin()" title="${data.pinned ? '取消置顶' : '置顶'}">${data.pinned ? '📌' : '📍'}</button>
        <button class="rename-btn" onclick="startRename()" title="重命名">✏️</button>
      </div>
      <div class="detail-info">
        <span title="${esc(cwd)}">📁 ${esc(data.project)}</span>
        <span>🕐 ${data.time}</span>
        <span>💬 ${data.messages.length} 条对话</span>
        <span>📦 ${data.file_size} MB</span>
        <span>🔑 ${data.id.substring(0, 8)}</span>
      </div>
      <div class="detail-actions">
        <button class="resume-btn" onclick="copyCurrentCmd(this)">${esc(currentCmd)}</button>
        <button class="compress-btn" onclick="generateSummary(this)">📝 ${data.has_summary ? '重新生成摘要' : '生成摘要'}</button>
        ${data.has_summary ? '<button class="restore-btn" onclick="showSummary()">📄 查看摘要</button>' : ''}
        <button class="delete-btn" id="del-btn" onclick="deleteSession(this)">🗑 删除</button>
      </div>
    </div>
    <div class="messages">
      ${data.messages.map(m => `
        <div class="msg msg-${m.role}">
          <div class="msg-header">
            <span class="msg-label">${({user:'You',assistant:'Claude',tool:'Tool'})[m.role]||m.role}</span>
            <span class="msg-time">${m.time}</span>
          </div>
          <div class="msg-content">${esc(m.content)}</div>
        </div>`).join('')}
    </div>
  `;
}

function copyCmd(btn, cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = cmd; btn.classList.remove('copied'); }, 2000);
  });
}

function copyCurrentCmd(btn) {
  navigator.clipboard.writeText(currentCmd).then(() => {
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = currentCmd; btn.classList.remove('copied'); }, 2000);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function startRename() {
  const el = document.getElementById('title-text');
  const old = el.textContent;
  el.outerHTML = `<input class="rename-input" id="rename-input" value="${esc(old)}"
    onkeydown="if(event.key==='Enter')saveRename();if(event.key==='Escape')select(activeId);"
    onblur="saveRename()">`;
  const inp = document.getElementById('rename-input');
  inp.focus(); inp.select();
}

async function saveRename() {
  const inp = document.getElementById('rename-input');
  if (!inp) return;
  await fetch('/api/rename', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id: activeId, name: inp.value.trim()})
  });
  select(activeId);
  loadSessions(document.getElementById('search').value);
}

async function togglePin() {
  await fetch('/api/pin', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id: activeId})
  });
  select(activeId);
  loadSessions(document.getElementById('search').value);
}

async function togglePinById(id) {
  await fetch('/api/pin', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id: id})
  });
  loadSessions(document.getElementById('search').value);
}

async function generateSummary(btn) {
  btn.textContent = '生成中...';
  btn.disabled = true;
  const res = await fetch('/api/summary', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id: activeId})
  });
  const data = await res.json();
  if (data.ok) {
    const mb = (data.size / 1024).toFixed(2);
    btn.textContent = `✓ 已生成 (${mb} MB)`;
    btn.classList.add('copied');
    setTimeout(() => select(activeId), 3000);
  } else {
    btn.textContent = '生成失败';
    btn.disabled = false;
  }
}

async function showSummary() {
  const res = await fetch(`/api/summary-content/${activeId}`);
  const data = await res.json();
  if (!data.ok) return;
  const html = marked.parse(data.content);
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal"><div class="modal-header">会话摘要<button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div><div class="modal-body md">${html}</div></div>`;
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}

async function deleteSession(btn) {
  const input = prompt('确认删除此会话？请输入 y 确认：');
  if (input !== 'y' && input !== 'Y') return;
  btn.textContent = '删除中...';
  btn.disabled = true;
  await fetch('/api/delete', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id: activeId})
  });
  activeId = null;
  document.getElementById('main').innerHTML = '<div class="main-empty"><div class="main-empty-icon">✓</div><div class="main-empty-text">已删除</div></div>';
  loadSessions(document.getElementById('search').value);
}

document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => loadSessions(e.target.value), 300);
});

loadSessions();
</script>
</body>
</html>
